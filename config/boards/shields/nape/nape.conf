# トラックボール (PMW3610 ALT driver - Zephyr 4.1 / ZMK main対応)
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_PMW3610_ALT=y

# Smart algorithm (surface coverage enhancement)
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# Axis inversion: applied in SOFTWARE after the layer-based rotation transform.
# X axis is inverted to match the physical sensor mounting on Nape.
CONFIG_PMW3610_ALT_INVERT_X=y

# USB HID (有線接続時もキーボード・マウスとして動作)
CONFIG_ZMK_USB=y

# Bluetooth
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# バッテリー
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# LED
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=y
# CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# ZMK Studio
#CONFIG_ZMK_STUDIO=y
#CONFIG_ZMK_STUDIO_LOCKING=n
